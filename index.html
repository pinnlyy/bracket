<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bettle Of World S1 - Tournament Bracket</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sky">
    <span class="bird b1">⌁</span>
    <span class="bird b2">⌁</span>
    <span class="bird b3">⌁</span>
  </div>

  <header class="hero">
    <div class="badge">COMPLETE TOURNAMENT MANAGEMENT</div>
    <h1>🏆 Bettle Of World</h1>
    <p>Season 1 • 32 CC Tournament Bracket</p>
    <div class="actions">
      <button id="resetBtn" class="btn danger">Reset Bracket</button>
      <button id="copyBtn" class="btn">Copy Rekap</button>
    </div>
  </header>

  <main>
    <section class="notice">
      <strong>INFO:</strong> Klik nama CC untuk pilih pemenang. Nama CC yang punya nomor WA bisa ditekan lama / klik tombol WA untuk chat perwakilan. ROOM 15: mpruyyXema DQ, KAGE AREA lolos otomatis.
    </section>

    <section class="champion-card" id="championCard">
      <div>JUARA</div>
      <h2 id="championName">Belum ditentukan</h2>
    </section>

    <section class="bracket" id="bracket"></section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
