<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bettle Of World S1</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#050505,#171022,#2b0b3f);
  color:white;
}
.header{
  text-align:center;
  padding:25px 15px;
}
.header h1{
  margin:0;
  font-size:32px;
  color:#fff;
  text-shadow:0 0 15px #a855f7;
}
.header p{color:#ccc}
.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}
.room{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:18px;
  padding:18px;
  margin-bottom:15px;
  box-shadow:0 0 15px rgba(168,85,247,.25);
}
.room-title{
  color:#c084fc;
  font-weight:bold;
  margin-bottom:12px;
}
.battle{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.cc{
  width:40%;
  background:rgba(0,0,0,.35);
  padding:15px;
  border-radius:14px;
  text-align:center;
  font-weight:bold;
}
.vs{
  font-size:22px;
  font-weight:bold;
  color:#ff3b3b;
  text-shadow:0 0 10px red;
}
.footer{
  text-align:center;
  padding:20px;
  color:#aaa;
}
@media(max-width:600px){
  .battle{flex-direction:column}
  .cc{width:90%}
}
</style>
</head>
<body>

<div class="header">
  <h1>🏆 Bettle Of World</h1>
  <p>Season 1 • 32 CC Battle Room</p>
</div>

<div class="container" id="rooms"></div>

<div class="footer">
  © Bettle Of World S1
</div>

<script>
const rooms = [
["marga 21","LETSGOFAMILY"],
["SURCINN VVIP","HEVEN 666"],
["NEX4PLUS+","The tarik"],
["INVASION AB","Volcano inti"],
["Volcano Jr","The tarik inti"],
["Dark Empire","Amfiteater area"],
["Badut Neverde 77","Strong Hunter"],
["Salvador New Era v1","Salvador New Era v2"],
["LS SYINDICATE","LS SYINDICATE V2"],
["SUPER XOXO 666","VELOCITY AREA"],
["BADUT ALL BASE","MARGA 19 INTI"],
["MARGA 19 JR","MARGA 77"],
["REALLY 12","SUPERSTAR AL BASE"],
["Ngawi 67","Kacaww maniaa"],
["mpruyyXema","KAGE AREA"],
["Seven Six","Perker Junior"]
];

const box = document.getElementById("rooms");

rooms.forEach((r,i)=>{
  box.innerHTML += `
  <div class="room">
    <div class="room-title">ROOM ${i+1}</div>
    <div class="battle">
      <div class="cc">${r[0]}</div>
      <div class="vs">VS</div>
      <div class="cc">${r[1]}</div>
    </div>
  </div>`;
});
</script>

</body>
</html>
