<!DOCTYPE html>
<html lang="id">
<head>

  <title>Bettle Of World S1 - Bracket</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sky-bg">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>

  </div>

  <header class="hero">
    <p class="eyebrow">TOURNAMENT BRACKET</p>
    <h1>🏆 Bettle Of World <span>(S 1)</span></h1>

  </header>

  <main>
    <section class="tools">
      <button onclick="copyBracket()">📋 Copy Rekap</button>
    </section>

    <section id="champion" class="champion hidden"></section>
    <section id="bracket" class="bracket"></section>
  </main>

  <footer>
    <p>© Bettle Of World S1 • Powered by Pinnly</p>
  </footer>

  <script src="script.js"></script>
